# Jarvis Configuration

# Voice Input Settings
voice_input:
  engine: whisper           # whisper (local) or system (macOS dictation)
  model: base.en            # Whisper model: tiny, base, small, medium, large
  language: en
  
# Voice Output Settings  
voice_output:
  engine: macos             # elevenlabs or macos
  elevenlabs_voice_id: "21m00Tcm4TlvDq8ikWAM"  # Rachel - British accent
  macos_voice: Daniel       # macOS voice name
  rate: 180                 # Words per minute
  
# Wake Word
wake_word:
  enabled: false            # Set to true to enable always-listening
  phrase: "hey jarvis"
  sensitivity: 0.5
  
# Push to Talk
push_to_talk:
  enabled: true
  hotkey: "<alt>"              # Just Option key (hold to talk)
  
# Claude Settings
claude:
  model: claude-sonnet-4-20250514
  max_tokens: 1024
  temperature: 0.7
  
# MCP Tools
mcp_servers:
  - name: desktop-commander
    command: npx
    args: ["@wonderwhy-er/desktop-commander@latest"]
    
# UI Settings
ui:
  enabled: true
  position: top-right       # top-right, top-left, bottom-right, bottom-left
  opacity: 0.9
  always_on_top: true
  
# Proactive Features
proactive:
  enabled: false
  morning_briefing: "08:00"
  calendar_reminders: true
  reminder_minutes: 10
  
# Logging
logging:
  level: INFO               # DEBUG, INFO, WARNING, ERROR
  file: logs/jarvis.log
