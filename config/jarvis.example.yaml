# Jarvis Configuration

# Voice Input Settings
voice_input:
  engine: text              # text input - use Wispr Flow for dictation
  
# Voice Output Settings  
voice_output:
  engine: macos             # elevenlabs or macos
  elevenlabs_voice_id: "21m00Tcm4TlvDq8ikWAM"  # Rachel - British accent
  macos_voice: Daniel       # macOS voice name
  rate: 180                 # Words per minute

# LLM Backend Settings
# Options: claude, lmstudio, ollama
llm:
  backend: lmstudio         # Switch to 'claude' for Anthropic API
  
  # LM Studio settings (when backend: lmstudio)
  api_base: "http://YOUR_WINDOWS_IP:1234/v1"  # Your Windows machine IP
  model: auto               # 'auto' uses first loaded model
  
  # Ollama settings (when backend: ollama)
  # api_base: "http://localhost:11434"
  # model: llama3.2
  
  # Claude settings (when backend: claude)
  # model: claude-sonnet-4-20250514
  
  # Common settings
  max_tokens: 1024
  temperature: 0.7
  
# UI Settings
ui:
  enabled: false
  position: top-right
  opacity: 0.9
  always_on_top: true
  
# Logging
logging:
  level: INFO
  file: logs/jarvis.log
