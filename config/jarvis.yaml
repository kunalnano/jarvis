# Yennefer Configuration - local Mac runtime

# Voice Input Settings
voice_input:
  engine: text

# Voice Output Settings
voice_output:
  engine: chatterbox
  # Live interaction uses the local Chatterbox clone. ElevenLabs is configured
  # only for explicit manual tests; do not silently fall back to paid TTS.
  voice_id: ${ELEVENLABS_VOICE_ID}
  api_key: ${ELEVENLABS_API_KEY}
  allow_elevenlabs_fallback: true
  model: eleven_turbo_v2_5
  stability: 0.6
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  speed: 0.96
  chatterbox:
    api_base: "http://127.0.0.1:8004"
    voice: /Users/alsharma/Projects/yennefer/.local/voice-clones/her.wav
    speed: 0.96
    startup_wait_seconds: 90
    retry_interval_seconds: 5
    probe_on_start: false
    params:
      exaggeration: 0.5
      cfg_weight: 0.5
      temperature: 0.8
  kokoro:
    model: prince-canuma/Kokoro-82M
    voice: bf_isabella
  allow_macos_fallback: false
  macos_voice: Samantha
  rate: 180

# LLM Backend Settings
llm:
  backend: lmstudio
  # Primary endpoint: LM Studio on Prometheus. Override with LM_STUDIO_API_BASE.
  api_base: "http://127.0.0.1:1234/v1"
  api_key: ${LM_API_TOKEN}
  model: qwen-agentworld-35b-a3b
  fallbacks:
    # Secondary endpoint: LM Studio on Stormbreaker/Windows.
    # Override with STORMBREAKER_LM_STUDIO_API_BASE or WINDOWS_LM_STUDIO_API_BASE.
    - name: stormbreaker-lm-studio
      api_base: "http://192.168.4.48:1234/v1"
      api_key: ${STORMBREAKER_LM_STUDIO_API_KEY}
      model: qwen-agentworld-35b-a3b
  max_tokens: 512
  temperature: 0.2
  context_limit: 32000

# Overlay / web chat server
server:
  port: 4343

# Machine identity
machine:
  canonical_name: Prometheus
  role: Prometheus / Local Mac / Yennefer-Codex surface
  macos_reported_computer_name: "Al's MacBook Pro"
  macos_reported_local_hostname: Als-MacBook-Pro.local
  tailscale_dns: als-macbook-pro.taild13a57.ts.net
  mac_hosts:
    current: Prometheus
    outgoing: Firestarter
  windows_hosts:
    - Stormbreaker
  invalid_aliases:
    - Stonebreaker
  not_this_host:
    - Firestarter
    - firestarter
    - Stormbreaker
    - Stonebreaker

# Local knowledge base
vault:
  path: /Users/alsharma/Documents/ai/obsidian-vault

# Local-first resource conductor
resources:
  enabled: true
  interval_seconds: 300
  registry_path: /Users/alsharma/Documents/ai/obsidian-vault/dvc/operating-model/DVC Machine & Agent Registry.md
  state_path: ~/.yennefer/state.json
  tally_dir: ~/.yennefer/resources
  queue_dir: ~/.yennefer/resource-queue
  vault_rag_url: http://127.0.0.1:8742
  local_fallback: queued
  champion_model: qwen-agentworld-35b-a3b

# Local PM / curator guardrails
pm:
  timezone: America/Chicago
  weekend_mode: auto
  weekend_personal_projects:
    - Yennefer
    - HELM
  worker_capacity: 3
  backlog_curator:
    enabled: true
    dry_run: true
    batch_size: 8

# Logging
logging:
  level: INFO
