<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yennefer</title>
<style>
  :root{ --bg:#0e0b14; --panel:#171221; --line:#2a2140; --txt:#e8e3f0; --muted:#9b8fb5;
         --accent:#a855f7; --accent2:#7c3aed; --user:#241a38; --code:#0b0814; }
  *{ box-sizing:border-box; }
  body{ margin:0; height:100vh; display:flex; flex-direction:column; background:
        radial-gradient(1200px 600px at 70% -10%, #1c1430 0%, var(--bg) 55%); color:var(--txt);
        font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header{ display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line);
          background:rgba(23,18,33,.6); backdrop-filter:blur(8px); }
  .dot{ width:9px; height:9px; border-radius:50%; background:#3ddc84; box-shadow:0 0 10px #3ddc84; }
  .dot.off{ background:#e0556b; box-shadow:0 0 10px #e0556b; }
  h1{ font:600 18px/1 "Iowan Old Style",Georgia,serif; letter-spacing:.5px; margin:0;
      background:linear-gradient(90deg,#c9a9ff,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sub{ color:var(--muted); font-size:12px; }
  .spacer{ flex:1; }
  .toggle{ display:flex; align-items:center; gap:7px; color:var(--muted); font-size:12px; cursor:pointer; user-select:none; }
  .toggle input{ accent-color:var(--accent); }
  #log{ flex:1; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; gap:14px; }
  .msg{ max-width:78%; padding:11px 15px; border-radius:16px; white-space:pre-wrap; word-wrap:break-word; }
  .msg.user{ align-self:flex-end; background:var(--user); border:1px solid var(--line); border-bottom-right-radius:5px; }
  .msg.yenn{ align-self:flex-start; background:linear-gradient(180deg,#1b1430,#171120);
             border:1px solid var(--line); border-bottom-left-radius:5px; }
  .who{ font-size:11px; color:var(--muted); margin:0 6px 4px; }
  .who.y{ color:var(--accent); }
  .action{ align-self:flex-start; max-width:78%; border:1px solid var(--line); border-left:3px solid var(--accent);
           border-radius:10px; background:#130f1e; overflow:hidden; }
  .action .h{ padding:7px 12px; font-size:12px; color:#c9a9ff; cursor:pointer; display:flex; gap:8px; align-items:center; }
  .action pre{ margin:0; padding:10px 12px; background:var(--code); border-top:1px solid var(--line);
               font:12px/1.5 ui-monospace,Menlo,monospace; color:#bdb2d6; max-height:240px; overflow:auto; white-space:pre-wrap; }
  .confirm{ align-self:flex-start; max-width:78%; border:1px solid #4a2f6e; background:#1d1430; border-radius:12px; padding:13px 15px; }
  .confirm code{ color:#f0c0ff; background:#0b0814; padding:2px 7px; border-radius:6px; font-size:13px; }
  .confirm .btns{ margin-top:11px; display:flex; gap:9px; }
  button{ font:inherit; border:0; border-radius:9px; padding:8px 16px; cursor:pointer; color:#fff; }
  .approve{ background:linear-gradient(90deg,var(--accent2),var(--accent)); }
  .cancel{ background:#2a2140; color:var(--muted); }
  .dots span{ display:inline-block; width:6px; height:6px; margin:0 2px; border-radius:50%; background:var(--accent); animation:b 1.2s infinite; }
  .dots span:nth-child(2){ animation-delay:.2s } .dots span:nth-child(3){ animation-delay:.4s }
  @keyframes b{ 0%,60%,100%{opacity:.25;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }
  footer{ padding:14px 20px; border-top:1px solid var(--line); background:rgba(23,18,33,.6); }
  .row{ display:flex; gap:10px; align-items:flex-end; max-width:1000px; margin:0 auto; }
  textarea{ flex:1; resize:none; background:var(--panel); color:var(--txt); border:1px solid var(--line);
            border-radius:12px; padding:12px 14px; font:inherit; max-height:140px; }
  textarea:focus{ outline:0; border-color:var(--accent2); }
  .send{ background:linear-gradient(90deg,var(--accent2),var(--accent)); padding:12px 20px; border-radius:12px; }
  .send:disabled{ opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>
    <div class="dot" id="status"></div>
    <div><h1>Yennefer</h1><div class="sub">local presence · qwen · on your Mac</div></div>
    <div class="spacer"></div>
    <label class="toggle"><input type="checkbox" id="voice"> speak replies</label>
  </header>
  <div id="log"></div>
  <footer>
    <div class="row">
      <textarea id="box" rows="1" placeholder="Ask Yennefer to do something..."></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </footer>
<script>
const log = document.getElementById('log');
const box = document.getElementById('box');
const sendBtn = document.getElementById('send');
const voice = document.getElementById('voice');

function el(cls, html){ const d=document.createElement('div'); d.className=cls; if(html!==undefined) d.innerHTML=html; return d; }
function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function scroll(){ log.scrollTop = log.scrollHeight; }

function bubble(who, text){
  const wrap = el('msg ' + (who==='you'?'user':'yenn'));
  const lbl = el('who' + (who==='you'?'':' y')); lbl.textContent = who==='you'?'You':'Yennefer';
  log.appendChild(lbl); wrap.textContent = text; log.appendChild(wrap); scroll();
}
function actionCard(a){
  const c = el('action');
  const h = el('h', '⚙︎ ran <b>'+esc(a.tool)+'</b> '+(a.args&&Object.keys(a.args).length?'· '+esc(JSON.stringify(a.args)):'')+'  <span style="color:#7a6f95">(show)</span>');
  const pre = document.createElement('pre'); pre.textContent = a.result || ''; pre.style.display='none';
  h.onclick = ()=>{ pre.style.display = pre.style.display==='none'?'block':'none'; };
  c.appendChild(h); c.appendChild(pre); log.appendChild(c); scroll();
}
function thinking(){ const t=el('msg yenn dots','<span></span><span></span><span></span>'); t.id='thinking'; log.appendChild(t); scroll(); }
function unthink(){ const t=document.getElementById('thinking'); if(t) t.remove(); }

async function post(payload){
  thinking();
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d = await r.json();
    unthink();
    (d.actions||[]).forEach(actionCard);
    if(d.reply) bubble('yenn', d.reply);
    if(d.pending) confirmCard(d.pending);
  }catch(e){ unthink(); bubble('yenn','(I lost the connection to my backend.)'); }
}
function confirmCard(p){
  const c = el('confirm');
  c.innerHTML = 'Run <code>'+esc(p.name)+'('+esc(JSON.stringify(p.args||{}))+')</code>?';
  const btns = el('btns');
  const yes = el('approve'); yes.textContent='Approve'; yes.onclick=()=>{ c.remove(); post({confirm:p, speak:voice.checked}); };
  const no = el('cancel'); no.textContent='Cancel'; no.onclick=()=>{ c.remove(); post({decline:true}); };
  btns.appendChild(yes); btns.appendChild(no); c.appendChild(btns); log.appendChild(c); scroll();
}
function send(){
  const t = box.value.trim(); if(!t) return;
  bubble('you', t); box.value=''; box.style.height='auto';
  post({message:t, speak:voice.checked});
}
sendBtn.onclick = send;
box.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
box.addEventListener('input', ()=>{ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,140)+'px'; });
bubble('yenn', "I'm here. Ask me something, or tell me to do something — check status, open an app, look at a repo, run one of your agents.");
box.focus();
</script>
</body>
</html>
