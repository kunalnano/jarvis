<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yennefer</title>
<style>
  :root{ --bg:#0e0b14; --panel:#171221; --line:#2a2140; --txt:#e8e3f0; --muted:#9b8fb5;
         --accent:#a855f7; --accent2:#7c3aed; --user:#241a38; --code:#0b0814; }
  *{ box-sizing:border-box; }
  body{ margin:0; height:100vh; display:flex; flex-direction:column; background:
        radial-gradient(1200px 600px at 70% -10%, #1c1430 0%, var(--bg) 55%); color:var(--txt);
        font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header{ display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line);
          background:rgba(23,18,33,.6); backdrop-filter:blur(8px); }
  .dot{ width:9px; height:9px; border-radius:50%; background:#3ddc84; box-shadow:0 0 10px #3ddc84; }
  .dot.off{ background:#e0556b; box-shadow:0 0 10px #e0556b; }
  h1{ font:600 18px/1 "Iowan Old Style",Georgia,serif; letter-spacing:.5px; margin:0;
      background:linear-gradient(90deg,#c9a9ff,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sub{ color:var(--muted); font-size:12px; }
  .spacer{ flex:1; }
  .pet-capsule{ min-width:230px; max-width:360px; height:46px; padding:5px 14px 5px 6px; border-radius:999px;
                display:flex; align-items:center; gap:10px; border:1px solid rgba(211,200,232,.18);
                background:linear-gradient(180deg,rgba(39,35,49,.82),rgba(18,15,24,.88));
                box-shadow:0 16px 38px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.08);
                color:#f4efff; overflow:hidden; }
  .pet-core{ flex:0 0 34px; width:34px; height:34px; border-radius:50%; display:grid; place-items:center;
             background:radial-gradient(circle at 34% 28%,#f5ebff 0 10%,#a855f7 34%,#392051 72%);
             box-shadow:0 0 16px rgba(168,85,247,.48); }
  .pet-eye{ width:13px; height:5px; border-radius:999px; background:#12091d; box-shadow:13px 0 0 #12091d; transform:translateX(-6px); }
  .pet-copy{ min-width:0; display:flex; flex-direction:column; line-height:1.2; }
  .pet-label{ font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pet-detail{ color:#bcb2cb; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pet-wave{ flex:0 0 auto; display:flex; align-items:center; gap:3px; height:18px; }
  .pet-wave i{ display:block; width:3px; height:7px; border-radius:999px; background:#6ee7b7; opacity:.55; }
  .pet-wave i:nth-child(2){ height:13px; } .pet-wave i:nth-child(3){ height:9px; }
  .pet-capsule.mood-listening{ border-color:rgba(110,231,183,.34); }
  .pet-capsule.mood-listening .pet-core{ background:radial-gradient(circle at 34% 28%,#f1fff8 0 10%,#34d399 36%,#173f35 72%); box-shadow:0 0 18px rgba(52,211,153,.5); }
  .pet-capsule.mood-thinking{ border-color:rgba(196,181,253,.34); }
  .pet-capsule.mood-thinking .pet-core{ animation:think 1.4s ease-in-out infinite; }
  .pet-capsule.mood-speaking .pet-wave i{ animation:w 860ms ease-in-out infinite; opacity:1; }
  .pet-capsule.mood-speaking .pet-wave i:nth-child(2){ animation-delay:120ms; } .pet-capsule.mood-speaking .pet-wave i:nth-child(3){ animation-delay:240ms; }
  .pet-capsule.mood-needs{ border-color:rgba(251,191,36,.45); }
  .pet-capsule.mood-needs .pet-core{ background:radial-gradient(circle at 34% 28%,#fff7d6 0 10%,#f59e0b 36%,#4b2a0d 72%); box-shadow:0 0 18px rgba(245,158,11,.55); }
  .pet-capsule.mood-degraded,.pet-capsule.mood-warn{ border-color:rgba(251,146,60,.48); }
  .pet-capsule.mood-degraded .pet-core,.pet-capsule.mood-warn .pet-core{ background:radial-gradient(circle at 34% 28%,#fff1df 0 10%,#fb923c 36%,#4a1f12 72%); box-shadow:0 0 18px rgba(251,146,60,.5); }
  .pet-capsule.mood-offline{ border-color:rgba(248,113,113,.5); }
  .pet-capsule.mood-offline .pet-core{ background:radial-gradient(circle at 34% 28%,#ffe9e9 0 10%,#f87171 36%,#4a141b 72%); box-shadow:0 0 18px rgba(248,113,113,.48); }
  @keyframes w{ 0%,100%{ transform:scaleY(.55); opacity:.45; } 45%{ transform:scaleY(1.45); opacity:1; } }
  @keyframes think{ 0%,100%{ transform:scale(.96); } 50%{ transform:scale(1.04); } }
  .toggle{ display:flex; align-items:center; gap:7px; color:var(--muted); font-size:12px; cursor:pointer; user-select:none; }
  .toggle input{ accent-color:var(--accent); }
  .voice-state{ display:flex; align-items:center; gap:10px; padding:9px 20px; border-bottom:1px solid var(--line);
                background:#120f1a; color:var(--muted); font-size:12px; }
  .voice-state.ok{ color:#b7efca; }
  .voice-state.warn{ color:#ffd28a; background:#1d160f; border-bottom-color:#4a3520; }
  .voice-state strong{ color:inherit; }
  .voice-state .spacer{ flex:1; }
  .voice-state button{ padding:6px 11px; border-radius:8px; background:#2a2140; color:#efe7ff; font-size:12px; }
  .voice-state.warn button{ background:#5d3415; color:#fff0cf; }
  #log{ flex:1; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; gap:14px; }
  .entry{ max-width:78%; display:flex; flex-direction:column; }
  .entry.user{ align-self:flex-end; align-items:flex-end; }
  .entry.yenn{ align-self:flex-start; align-items:flex-start; }
  .msg{ max-width:100%; padding:11px 15px; border-radius:16px; white-space:pre-wrap; word-wrap:break-word; }
  .msg.user{ align-self:flex-end; background:var(--user); border:1px solid var(--line); border-bottom-right-radius:5px; }
  .msg.yenn{ align-self:flex-start; background:linear-gradient(180deg,#1b1430,#171120);
             border:1px solid var(--line); border-bottom-left-radius:5px; }
  .who{ font-size:11px; color:var(--muted); margin:0 6px 4px; }
  .who.y{ color:var(--accent); }
  .stamp{ color:var(--muted); }
  .action{ align-self:flex-start; max-width:78%; border:1px solid var(--line); border-left:3px solid var(--accent);
           border-radius:10px; background:#130f1e; overflow:hidden; }
  .action .h{ padding:7px 12px; font-size:12px; color:#c9a9ff; cursor:pointer; display:flex; gap:8px; align-items:center; }
  .action pre{ margin:0; padding:10px 12px; background:var(--code); border-top:1px solid var(--line);
               font:12px/1.5 ui-monospace,Menlo,monospace; color:#bdb2d6; max-height:240px; overflow:auto; white-space:pre-wrap; }
  .confirm{ align-self:flex-start; max-width:78%; border:1px solid #4a2f6e; background:#1d1430; border-radius:12px; padding:13px 15px; }
  .confirm code{ color:#f0c0ff; background:#0b0814; padding:2px 7px; border-radius:6px; font-size:13px; }
  .confirm .btns{ margin-top:11px; display:flex; gap:9px; }
  button{ font:inherit; border:0; border-radius:9px; padding:8px 16px; cursor:pointer; color:#fff; }
  .approve{ background:linear-gradient(90deg,var(--accent2),var(--accent)); }
  .cancel{ background:#2a2140; color:var(--muted); }
  .dots span{ display:inline-block; width:6px; height:6px; margin:0 2px; border-radius:50%; background:var(--accent); animation:b 1.2s infinite; }
  .dots span:nth-child(2){ animation-delay:.2s } .dots span:nth-child(3){ animation-delay:.4s }
  @keyframes b{ 0%,60%,100%{opacity:.25;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }
  footer{ padding:14px 20px; border-top:1px solid var(--line); background:rgba(23,18,33,.6); }
  .row{ display:flex; gap:10px; align-items:flex-end; max-width:1000px; margin:0 auto; }
  textarea{ flex:1; resize:none; background:var(--panel); color:var(--txt); border:1px solid var(--line);
            border-radius:12px; padding:12px 14px; font:inherit; max-height:140px; }
  textarea:focus{ outline:0; border-color:var(--accent2); }
  .send{ background:linear-gradient(90deg,var(--accent2),var(--accent)); padding:12px 20px; border-radius:12px; }
  .send:disabled{ opacity:.5; cursor:default; }
  @media (max-width:760px){
    header{ flex-wrap:wrap; }
    .pet-capsule{ order:3; width:100%; max-width:none; }
  }
</style>
</head>
<body>
  <header>
    <div class="dot" id="status"></div>
    <div><h1>Yennefer</h1><div class="sub">local presence · LM Studio · on your Mac</div></div>
    <div class="spacer"></div>
    <div class="pet-capsule mood-idle" id="petCapsule" aria-live="polite">
      <div class="pet-core"><div class="pet-eye"></div></div>
      <div class="pet-copy">
        <div class="pet-label" id="petLabel">Idle</div>
        <div class="pet-detail" id="petDetail">Yennefer is ready</div>
      </div>
      <div class="pet-wave" aria-hidden="true"><i></i><i></i><i></i></div>
    </div>
    <label class="toggle"><input type="checkbox" id="voice" checked> speak replies</label>
  </header>
  <div class="voice-state" id="voiceState" hidden>
    <strong id="voiceEngine"></strong>
    <span id="voiceSummary"></span>
    <div class="spacer"></div>
    <button id="voiceProbe" type="button">Check</button>
    <button id="voiceReload" type="button">Reload Chatterbox</button>
  </div>
  <div id="log"></div>
  <footer>
    <div class="row">
      <textarea id="box" rows="1" placeholder="Ask Yennefer to do something..."></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </footer>
<script>
const log = document.getElementById('log');
const box = document.getElementById('box');
const sendBtn = document.getElementById('send');
const voice = document.getElementById('voice');
const statusDot = document.getElementById('status');
const voiceState = document.getElementById('voiceState');
const voiceEngine = document.getElementById('voiceEngine');
const voiceSummary = document.getElementById('voiceSummary');
const voiceProbe = document.getElementById('voiceProbe');
const voiceReload = document.getElementById('voiceReload');
const petCapsule = document.getElementById('petCapsule');
const petLabel = document.getElementById('petLabel');
const petDetail = document.getElementById('petDetail');

function el(cls, html){ const d=document.createElement('div'); d.className=cls; if(html!==undefined) d.innerHTML=html; return d; }
function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function stamp(){
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function scroll(){ log.scrollTop = 0; }
function setPetMood(mood, label, detail){
  petCapsule.className = 'pet-capsule mood-' + (mood || 'idle');
  petLabel.textContent = label || 'Idle';
  petDetail.textContent = detail || 'Yennefer is ready';
}
function renderPetStatus(d){
  if(!d){ return; }
  setPetMood(d.mood, d.label, d.detail);
}
async function refreshPetStatus(){
  try{
    const r = await fetch('/api/pet/status');
    renderPetStatus(await r.json());
  }catch(e){
    setPetMood('offline', 'Offline', 'Backend is unreachable');
  }
}

function bubble(who, text){
  const entry = el('entry ' + (who==='you'?'user':'yenn'));
  const wrap = el('msg ' + (who==='you'?'user':'yenn'));
  const lbl = el('who' + (who==='you'?'':' y'));
  lbl.innerHTML = (who==='you'?'You':'Yennefer') + ' <span class="stamp">' + stamp() + '</span>';
  wrap.textContent = text;
  entry.appendChild(lbl);
  entry.appendChild(wrap);
  log.prepend(entry);
  scroll();
}
function actionCard(a){
  const c = el('action');
  const h = el('h', '⚙︎ ran <b>'+esc(a.tool)+'</b> '+(a.args&&Object.keys(a.args).length?'· '+esc(JSON.stringify(a.args)):'')+'  <span style="color:#7a6f95">(show)</span>');
  const pre = document.createElement('pre'); pre.textContent = a.result || ''; pre.style.display='none';
  h.onclick = ()=>{ pre.style.display = pre.style.display==='none'?'block':'none'; };
  c.appendChild(h); c.appendChild(pre); log.prepend(c); scroll();
}
function thinking(){ const t=el('msg yenn dots','<span></span><span></span><span></span>'); t.id='thinking'; log.prepend(t); scroll(); }
function unthink(){ const t=document.getElementById('thinking'); if(t) t.remove(); }

async function post(payload){
  thinking();
  setPetMood('thinking', 'Thinking', 'Working on it');
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d = await r.json();
    unthink();
    (d.actions||[]).forEach(actionCard);
    if(d.reply) bubble('yenn', d.reply);
    if(d.pending) confirmCard(d.pending);
    refreshVoiceStatus();
    refreshPetStatus();
  }catch(e){ unthink(); bubble('yenn','(I lost the connection to my backend.)'); }
}
function confirmCard(p){
  const c = el('confirm');
  c.innerHTML = 'Run <code>'+esc(p.name)+'('+esc(JSON.stringify(p.args||{}))+')</code>?';
  const btns = el('btns');
  const yes = el('approve'); yes.textContent='Approve'; yes.onclick=()=>{ c.remove(); post({confirm:p, speak:voice.checked}); };
  const no = el('cancel'); no.textContent='Cancel'; no.onclick=()=>{ c.remove(); post({decline:true}); };
  btns.appendChild(yes); btns.appendChild(no); c.appendChild(btns); log.prepend(c); scroll();
}
function send(){
  const t = box.value.trim(); if(!t) return;
  bubble('you', t); box.value=''; box.style.height='auto';
  post({message:t, speak:voice.checked});
}
function renderVoiceStatus(d){
  if(!d){ return; }
  const engine = d.engine || 'unknown';
  const preferred = d.preferred_engine || engine;
  const warning = d.fallback_warning || '';
  const health = d.chatterbox && d.chatterbox.health;
  const chatterboxUnhealthy = preferred === 'chatterbox' && health && health.ok === false;
  voiceState.hidden = false;
  voiceState.className = 'voice-state ' + (warning || chatterboxUnhealthy ? 'warn' : 'ok');
  voiceEngine.textContent = 'Voice: ' + engine;
  if(warning){
    voiceSummary.textContent = warning;
    statusDot.classList.add('off');
  }else if(chatterboxUnhealthy){
    voiceSummary.textContent = 'Chatterbox health check failed: ' + (health.reason || 'not ready');
    statusDot.classList.add('off');
  }else if(engine === 'chatterbox'){
    const probe = health && health.checks && health.checks.audio_probe === 'ok' ? ' · audio probe ok' : '';
    voiceSummary.textContent = 'Local Chatterbox clone active' + probe;
    statusDot.classList.remove('off');
  }else if(preferred === 'chatterbox'){
    voiceSummary.textContent = 'Preferred Chatterbox is not active.';
    statusDot.classList.add('off');
  }else{
    voiceSummary.textContent = 'Configured engine active.';
    statusDot.classList.remove('off');
  }
}
async function refreshVoiceStatus(probe=false){
  try{
    const r = await fetch('/api/voice/status' + (probe ? '?probe=true' : ''));
    renderVoiceStatus(await r.json());
    refreshPetStatus();
  }catch(e){
    voiceState.hidden = false;
    voiceState.className = 'voice-state warn';
    voiceEngine.textContent = 'Voice: unknown';
    voiceSummary.textContent = 'Voice status is unavailable.';
    statusDot.classList.add('off');
  }
}
async function reloadChatterbox(){
  voiceReload.disabled = true;
  setPetMood('listening', 'Checking voice', 'Reloading Chatterbox');
  try{
    const r = await fetch('/api/voice/reload-chatterbox',{method:'POST'});
    const d = await r.json();
    renderVoiceStatus(d.voice || d);
    if(d.promoted) bubble('yenn','Chatterbox is healthy again. I am back on the local clone voice.');
    else if(d.reason) bubble('yenn','Chatterbox is not ready yet: ' + d.reason);
  }catch(e){
    bubble('yenn','I could not reload Chatterbox from here.');
  }finally{
    voiceReload.disabled = false;
    refreshPetStatus();
  }
}
sendBtn.onclick = send;
voiceProbe.onclick = ()=>refreshVoiceStatus(true);
voiceReload.onclick = reloadChatterbox;
box.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
box.addEventListener('input', ()=>{ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,140)+'px'; });
bubble('yenn', "I'm here. Ask me something, or tell me to do something — check status, open an app, look at a repo, run one of your agents.");
refreshVoiceStatus();
refreshPetStatus();
setInterval(refreshPetStatus, 4000);
box.focus();
</script>
</body>
</html>
